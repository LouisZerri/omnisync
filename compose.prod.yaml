# Orchestration de PRODUCTION d'OmniSync.
#
# Déploiement :
#   cp .env.prod.dist .env.prod   # puis renseigner les secrets
#   docker compose -f compose.prod.yaml --env-file .env.prod up -d --build
#   docker compose -f compose.prod.yaml --env-file .env.prod run --rm app php bin/console doctrine:migrations:migrate --no-interaction
#
# L'app FrankenPHP héberge le hub Mercure (pas de conteneur Mercure séparé) et n'est
# exposée qu'en local (127.0.0.1:8080) ; Apache proxie omnisync.lzerri-project.fr + TLS.

# Variables d'environnement partagées par l'app (web) et le worker (messenger:consume).
x-app-env: &app-env
  APP_ENV: prod
  APP_SECRET: ${APP_SECRET}
  DATABASE_URL: "mysql://omnisync:${MYSQL_PASSWORD}@database:3306/omnisync?serverVersion=8.0&charset=utf8mb4"
  MESSENGER_TRANSPORT_DSN: "amqp://omnisync:${RABBITMQ_PASSWORD}@messenger:5672/%2f/messages"
  MAILER_DSN: ${MAILER_DSN:-null://null}
  # Hub Mercure intégré au conteneur "app" : on publie vers lui par son nom de service.
  MERCURE_URL: http://app:8080/.well-known/mercure
  MERCURE_PUBLIC_URL: https://omnisync.lzerri-project.fr/.well-known/mercure
  MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
  MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
  MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
  # Canaux marketplace (services internes, joints par nom)
  CHANNEL_VOLTURA_BASE_URL: http://voltura:3000
  CHANNEL_VOLTURA_API_KEY: voltura-demo-key
  CHANNEL_CARTELIO_BASE_URL: http://cartelio:3000
  CHANNEL_CARTELIO_API_KEY: cartelio-demo-key
  CHANNEL_ZELMARK_BASE_URL: http://zelmark:3000
  CHANNEL_ZELMARK_API_KEY: zelmark-demo-key

services:
  app:
    build:
      context: .
    image: omnisync/app:latest
    restart: unless-stopped
    environment:
      <<: *app-env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      database:
        condition: service_healthy
      messenger:
        condition: service_healthy

  worker:
    image: omnisync/app:latest
    restart: unless-stopped
    command: php bin/console messenger:consume async --time-limit=3600 -v
    environment:
      <<: *app-env
    depends_on:
      app:
        condition: service_started
      database:
        condition: service_healthy
      messenger:
        condition: service_healthy

  database:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: omnisync
      MYSQL_USER: omnisync
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  messenger:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: omnisync
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --- Canaux marketplace : une image, 3 instances aux personnalités distinctes ---
  voltura:
    build: ./marketplace-service
    image: omnisync/marketplace:latest
    restart: unless-stopped
    environment:
      CHANNEL_NAME: Voltura
      API_KEY: voltura-demo-key
      LATENCY_MS: 50
      ERROR_RATE: 0
      STRICT_VALIDATION: "false"
      RATE_LIMIT: 0

  cartelio:
    image: omnisync/marketplace:latest
    restart: unless-stopped
    environment:
      CHANNEL_NAME: Cartelio
      API_KEY: cartelio-demo-key
      LATENCY_MS: 2000
      ERROR_RATE: 0.05
      STRICT_VALIDATION: "false"
      RATE_LIMIT: 0
    depends_on:
      - voltura

  zelmark:
    image: omnisync/marketplace:latest
    restart: unless-stopped
    environment:
      CHANNEL_NAME: Zelmark
      API_KEY: zelmark-demo-key
      LATENCY_MS: 300
      ERROR_RATE: 0.2
      STRICT_VALIDATION: "true"
      RATE_LIMIT: 5
    depends_on:
      - voltura

volumes:
  db_data:
  rabbitmq_data:
  uploads:
