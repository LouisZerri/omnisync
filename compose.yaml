services:
  ###> doctrine/doctrine-bundle ###
  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-omnisync}
      # You should definitely change the password in production
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-omnisync}
      MYSQL_USER: ${MYSQL_USER:-omnisync}
      MYSQL_RANDOM_ROOT_PASSWORD: "true"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-omnisync}", "-p${MYSQL_PASSWORD:-omnisync}"]
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - database_data:/var/lib/mysql:rw
  ###< doctrine/doctrine-bundle ###

  messenger:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-omnisync}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-omnisync}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - messenger_data:/var/lib/rabbitmq:rw

  ###> symfony/mailer ###
  mailpit:
    image: axllent/mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
  ###< symfony/mailer ###

  # --- Canaux marketplace : une seule image, 3 instances aux personnalités distinctes ---
  voltura:
    build: ./marketplace-service
    image: omnisync/marketplace
    environment:
      CHANNEL_NAME: Voltura
      API_KEY: voltura-dev-key
      LATENCY_MS: 50
      ERROR_RATE: 0
      STRICT_VALIDATION: "false"
      RATE_LIMIT: 0

  cartelio:
    image: omnisync/marketplace
    environment:
      CHANNEL_NAME: Cartelio
      API_KEY: cartelio-dev-key
      LATENCY_MS: 2000
      ERROR_RATE: 0.05
      STRICT_VALIDATION: "false"
      RATE_LIMIT: 0

  zelmark:
    image: omnisync/marketplace
    environment:
      CHANNEL_NAME: Zelmark
      API_KEY: zelmark-dev-key
      LATENCY_MS: 300
      ERROR_RATE: 0.2
      STRICT_VALIDATION: "true"
      RATE_LIMIT: 5
      RATE_WINDOW_MS: 10000

###> symfony/mercure-bundle ###
  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      # HTTPS désactivé en dev : le hub sert du HTTP pur (pas de redirection 308),
      # ce qui évite tout souci de certificat/mixed-content avec l'app servie en HTTP.
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_SUBSCRIBER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      # Set the URL of your Symfony project (without trailing slash!) as value of the cors_origins directive
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://127.0.0.1:8000
    # Comment the following line to disable the development mode
    command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - mercure_data:/data
      - mercure_config:/config
###< symfony/mercure-bundle ###

volumes:
  ###> doctrine/doctrine-bundle ###
  database_data:
  ###< doctrine/doctrine-bundle ###
  messenger_data:

###> symfony/mercure-bundle ###
  mercure_data:
  mercure_config:
###< symfony/mercure-bundle ###
